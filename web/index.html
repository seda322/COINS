<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incremental Coin Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            box-shadow: 0 0 20px black;
        }
    </style>
    <!-- Подключаем SDK Яндекса -->
    <script src="https://yandex.ru/games/sdk/v2"></script>
</head>
<body>
    <!-- Канвас для игры -->
    <canvas id="canvas"></canvas>

    <!-- Скрипт инициализации и рекламы -->
    <script>
        // 1. Переменные для синхронизации Python <--> JS
        window.last_reward_success = false;
        window.ad_is_open = false; // Флаг: открыта ли реклама сейчас (для паузы)

        // 2. Инициализируем SDK
        YaGames.init().then(ysdk => {
            console.log("Yandex SDK initialized");
            window.ysdk = ysdk;

            // Передаем язык в Python
            var lang = ysdk.environment.i18n.tld === 'ru' ? 'ru' : 'en';
            waitForPyodide(lang);

            // === ВКЛЮЧАЕМ БАННЕР СРАЗУ ===
            // Баннер будет внизу экрана. Игра должна учитывать это (или перекрывать).
            showBanner();

        }).catch(err => {
            console.error("Yandex SDK init error:", err);
            waitForPyodide('ru');
        });

        function waitForPyodide(lang) {
            let interval = setInterval(() => {
                if (window.pyodide && window.pyodide.runPython) {
                    clearInterval(interval);
                    try {
                        window.pyodide.runPython(`
import localization
import yandex_helper
localization.current_lang = "${lang}"
print(f"Language set to: ${lang}")
                        `);
                    } catch(e) { console.log("Python lang sync error", e); }
                }
            }, 100);
        }

        // === ФУНКЦИИ РЕКЛАМЫ ===

        // 1. БАННЕРНАЯ РЕКЛАМА (Sticky Banner)
        function showBanner() {
            if (!window.ysdk) return;
            window.ysdk.adv.showBannerAdv();
            console.log("Banner Ad requested");
        }

        // 2. МЕЖСТРАНИЧНАЯ РЕКЛАМА (Interstitial) - раз в 2 минуты
        function showInterstitial() {
            if (!window.ysdk) return;

            // Если реклама уже открыта, новую не вызываем
            if (window.ad_is_open) return;

            console.log("Requesting Interstitial Ad...");
            window.ysdk.adv.showFullscreenAdv({
                callbacks: {
                    onOpen: () => {
                        window.ad_is_open = true;
                        console.log("Interstitial opened");
                        // Уведомляем Python, что нужно поставить паузу
                        if(window.pyodide) window.pyodide.runPython('yandex_helper.on_ad_opened()');
                    },
                    onClose: (wasShown) => {
                        window.ad_is_open = false;
                        console.log("Interstitial closed");
                        if(window.pyodide) window.pyodide.runPython('yandex_helper.on_ad_closed()');
                    },
                    onError: (e) => {
                        window.ad_is_open = false;
                        console.log("Interstitial error", e);
                        if(window.pyodide) window.pyodide.runPython('yandex_helper.on_ad_closed()');
                    }
                }
            });
        }

        // 3. РЕКЛАМА ЗА ВОЗНАГРАЖДЕНИЕ (Rewarded Video)
        function showRewardedVideo() {
            if (!window.ysdk) return;

            console.log("Requesting Rewarded Video...");
            window.ysdk.adv.showRewardedVideo({
                callbacks: {
                    onOpen: () => {
                        window.ad_is_open = true;
                        // Ставим паузу
                        if(window.pyodide) window.pyodide.runPython('yandex_helper.on_ad_opened()');
                    },
                    onRewarded: () => {
                        console.log("Reward Granted!");
                        // Ставим флаг, который Python проверит в следующем кадре
                        window.last_reward_success = true;
                    },
                    onClose: () => {
                        window.ad_is_open = false;
                        if(window.pyodide) window.pyodide.runPython('yandex_helper.on_ad_closed()');
                    },
                    onError: (e) => {
                        window.ad_is_open = false;
                        console.log("Rewarded error", e);
                        if(window.pyodide) window.pyodide.runPython('yandex_helper.on_ad_closed()');
                    }
                }
            });
        }

        // Функция проверки тачскрина
        window.hasTouchScreen = function() {
            return ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        };
    </script>

    <!-- Загрузка Pyodide и вашего приложения -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script src="pygadget.js"></script>
</body>
</html>
